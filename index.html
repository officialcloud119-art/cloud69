<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud69 - Social Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=Playfair+Display:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6d28d9;
            --secondary: #06b6d4;
            --accent: #ec4899;
            --dark-bg: #0a0e27;
            --darker-bg: #12192b;
            --card-bg: #1a2847;
            --border: #2d3e5f;
            --text: #f0f9ff;
            --text-light: #a8b5c4;
            --success: #10b981;
            --danger: #f43f5e;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #16213e 100%);
            color: var(--text);
            overflow-x: hidden;
        }

        /* ===== AUTH PAGES ===== */
        #authContainer {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #6d28d9 0%, #06b6d4 50%, #ec4899 100%);
        }

        #authContainer.hidden {
            display: none !important;
        }

        .auth-box {
            background: rgba(26, 40, 71, 0.95);
            backdrop-filter: blur(20px);
            padding: 3.5rem;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            border: 2px solid rgba(109, 40, 217, 0.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        #signupPage {
            display: none;
        }

        .auth-box h2 {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 2.5rem;
            font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, #06b6d4 0%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-box input {
            width: 100%;
            padding: 1.1rem;
            margin-bottom: 1.2rem;
            background: rgba(26, 56, 62, 0.6);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }

        .auth-box input::placeholder {
            color: var(--text-light);
        }

        .auth-box input:focus {
            outline: none;
            border-color: #06b6d4;
            background: rgba(6, 182, 212, 0.1);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.2);
        }

        .auth-box button {
            width: 100%;
            padding: 1.1rem;
            background: linear-gradient(135deg, #06b6d4 0%, #6d28d9 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
            margin-bottom: 1rem;
            transition: all 0.3s;
            font-family: 'Poppins', sans-serif;
        }

        .auth-box button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(6, 182, 212, 0.4);
        }

        .auth-toggle {
            text-align: center;
            color: var(--text-light);
            font-family: 'Poppins', sans-serif;
        }

        .auth-toggle button {
            background: none;
            border: none;
            color: #06b6d4;
            cursor: pointer;
            text-decoration: underline;
            margin-left: 0.3rem;
            font-weight: 600;
        }

        /* ===== APP LAYOUT ===== */
        #appContainer {
            display: none;
            width: 100%;
            height: 100vh;
        }

        #appContainer.active {
            display: flex;
            flex-direction: column;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            position: sticky;
            top: 0;
            background: rgba(10, 14, 39, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid rgba(109, 40, 217, 0.3);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .navbar-brand {
            font-size: 2rem;
            font-weight: 800;
            font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, #06b6d4 0%, #ec4899 50%, #6d28d9 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .navbar-tabs {
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }

        .nav-btn {
            padding: 0.7rem 1.4rem;
            background: rgba(45, 62, 95, 0.5);
            border: 1px solid var(--border);
            color: var(--text-light);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            font-size: 0.95rem;
            font-family: 'Poppins', sans-serif;
        }

        .nav-btn:hover,
        .nav-btn.active {
            background: linear-gradient(135deg, #06b6d4 0%, #6d28d9 100%);
            color: white;
            border: none;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(6, 182, 212, 0.3);
        }

        .notification-badge {
            position: relative;
        }

        .badge {
            position: absolute;
            top: -10px;
            right: -10px;
            background: linear-gradient(135deg, #f43f5e 0%, #ec4899 100%);
            color: white;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
            border: 2px solid var(--dark-bg);
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 2.5rem;
            max-width: 100%;
        }

        .page {
            display: none;
            animation: fadeIn 0.4s ease-in;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== FEED PAGE ===== */
        .feed {
            max-width: 650px;
            margin: 0 auto;
        }

        .create-post {
            background: linear-gradient(135deg, rgba(109, 40, 217, 0.2) 0%, rgba(6, 182, 212, 0.1) 100%);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2.5rem;
            backdrop-filter: blur(10px);
        }

        .create-post textarea {
            width: 100%;
            padding: 1.2rem;
            background: rgba(26, 40, 71, 0.8);
            border: none;
            border-radius: 14px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            min-height: 100px;
            resize: vertical;
            margin-bottom: 1.2rem;
            transition: all 0.3s;
        }

        .create-post textarea:focus {
            outline: none;
            background: rgba(26, 56, 62, 0.9);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.2);
        }

        .create-post-actions {
            display: flex;
            gap: 1rem;
        }

        .create-post-actions input {
            display: none;
        }

        .image-upload-btn {
            padding: 0.8rem 1.6rem;
            background: rgba(26, 40, 71, 0.6);
            border: 2px dashed var(--border);
            border-radius: 10px;
            color: var(--text-light);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .image-upload-btn:hover {
            border-color: #06b6d4;
            color: #06b6d4;
        }

        .post-btn {
            padding: 0.8rem 2rem;
            background: linear-gradient(135deg, #06b6d4 0%, #6d28d9 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s;
        }

        .post-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(6, 182, 212, 0.3);
        }

        .post-card {
            background: linear-gradient(135deg, rgba(109, 40, 217, 0.15) 0%, rgba(6, 182, 212, 0.1) 100%);
            border-radius: 20px;
            padding: 1.8rem;
            margin-bottom: 2rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .post-card:hover {
            transform: translateY(-2px);
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
            cursor: pointer;
        }

        .post-author {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex: 1;
        }

        .post-avatar {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: linear-gradient(135deg, #06b6d4 0%, #6d28d9 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
            background-size: cover;
            background-position: center;
        }

        .post-info h4 {
            margin: 0;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Poppins', sans-serif;
        }

        .post-info small {
            color: var(--text-light);
            font-size: 0.85rem;
        }

        .post-content {
            margin: 1rem 0;
            line-height: 1.7;
            word-break: break-word;
            font-size: 1rem;
        }

        .post-image {
            width: 100%;
            border-radius: 14px;
            margin: 1rem 0;
            max-height: 400px;
            object-fit: cover;
        }

        .post-stats {
            display: flex;
            gap: 2rem;
            padding-top: 1rem;
            margin-top: 1rem;
            color: var(--text-light);
        }

        .stat {
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
            text-align: center;
            padding: 0.6rem;
            border-radius: 10px;
            font-weight: 600;
            user-select: none;
        }

        .stat:hover {
            color: #06b6d4;
            background: rgba(6, 182, 212, 0.1);
        }

        .delete-btn {
            background: none;
            border: none;
            color: #f43f5e;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
        }

        .delete-btn:hover {
            transform: scale(1.1);
        }

        /* ===== MARKETPLACE ===== */
        .marketplace {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .item-card {
            background: linear-gradient(135deg, rgba(109, 40, 217, 0.15) 0%, rgba(6, 182, 212, 0.1) 100%);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .item-card:hover {
            transform: translateY(-8px);
        }

        .item-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .item-details {
            padding: 1.5rem;
        }

        .item-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            font-family: 'Poppins', sans-serif;
        }

        .item-price {
            background: linear-gradient(135deg, #06b6d4 0%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .item-seller {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .item-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        /* ===== PROFILE PAGE ===== */
        .profile-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .profile-header {
            background: linear-gradient(135deg, rgba(109, 40, 217, 0.15) 0%, rgba(6, 182, 212, 0.1) 100%);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2.5rem;
            backdrop-filter: blur(10px);
        }

        .profile-top {
            display: flex;
            gap: 2rem;
            align-items: flex-start;
            margin-bottom: 2rem;
        }

        .profile-pic-container {
            position: relative;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #06b6d4 0%, #6d28d9 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 700;
            background-size: cover;
            background-position: center;
            flex-shrink: 0;
        }

        .profile-pic-input {
            display: none;
        }

        .profile-pic-add {
            position: absolute;
            bottom: -5px;
            right: -5px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #06b6d4 0%, #6d28d9 100%);
            border: 3px solid var(--dark-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
        }

        .profile-pic-add:hover {
            transform: scale(1.1);
        }

        .profile-info {
            flex: 1;
        }

        .profile-name {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 0.2rem;
            font-family: 'Playfair Display', serif;
        }

        .profile-username {
            color: var(--text-light);
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }

        .profile-bio {
            color: var(--text-light);
            cursor: pointer;
            padding: 0.8rem;
            background: transparent;
            border: none;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 1rem;
            transition: all 0.3s;
        }

        .profile-bio:hover {
            color: #06b6d4;
        }

        .profile-stats {
            display: flex;
            gap: 2rem;
        }

        .stat-box {
            text-align: center;
        }

        .stat-number {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #06b6d4 0%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            color: var(--text-light);
            font-size: 0.85rem;
            margin-top: 0.3rem;
        }

        /* ===== MESSAGES PAGE ===== */
        .messages-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 2rem;
            height: calc(100vh - 150px);
            max-width: 1400px;
            margin: 0 auto;
        }

        .conversations-list {
            background: linear-gradient(135deg, rgba(109, 40, 217, 0.15) 0%, rgba(6, 182, 212, 0.1) 100%);
            border-radius: 20px;
            overflow-y: auto;
            padding: 1rem;
            backdrop-filter: blur(10px);
        }

        .add-friend-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #06b6d4 0%, #6d28d9 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 1rem;
            transition: all 0.3s;
            font-family: 'Poppins', sans-serif;
        }

        .add-friend-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(6, 182, 212, 0.3);
        }

        .conversation-item {
            padding: 1rem;
            background: rgba(26, 40, 71, 0.4);
            border-radius: 12px;
            margin-bottom: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .conversation-item:hover,
        .conversation-item.active {
            background: rgba(6, 182, 212, 0.15);
            transform: translateX(4px);
        }

        .conversation-name {
            font-weight: 700;
            font-family: 'Poppins', sans-serif;
        }

        .conversation-actions {
            display: flex;
            gap: 0.5rem;
        }

        .conversation-actions button {
            background: none;
            border: none;
            color: var(--text-light);
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .conversation-actions button:hover {
            color: #06b6d4;
            transform: scale(1.2);
        }

        .chat-area {
            background: linear-gradient(135deg, rgba(109, 40, 217, 0.15) 0%, rgba(6, 182, 212, 0.1) 100%);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .chat-header {
            padding: 1.5rem;
            font-weight: 700;
            font-family: 'Poppins', sans-serif;
            background: rgba(26, 40, 71, 0.3);
            border-bottom: 1px solid rgba(109, 40, 217, 0.2);
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            display: flex;
            margin-bottom: 0.8rem;
            animation: slideIn 0.3s ease-in;
        }

        .message.own {
            justify-content: flex-end;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-bubble {
            max-width: 70%;
            padding: 1rem;
            border-radius: 16px;
            background: rgba(26, 40, 71, 0.7);
            word-break: break-word;
        }

        .message.own .message-bubble {
            background: linear-gradient(135deg, #06b6d4 0%, #6d28d9 100%);
            color: white;
        }

        .message-input {
            padding: 1.5rem;
            display: flex;
            gap: 1rem;
            background: rgba(26, 40, 71, 0.3);
            border-top: 1px solid rgba(109, 40, 217, 0.2);
        }

        .message-input input {
            flex: 1;
            padding: 0.9rem;
            background: rgba(26, 40, 71, 0.6);
            border: none;
            border-radius: 12px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }

        .message-input input:focus {
            outline: none;
            background: rgba(6, 182, 212, 0.1);
        }

        .message-input button {
            padding: 0.9rem 1.8rem;
            background: linear-gradient(135deg, #06b6d4 0%, #6d28d9 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .message-input button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(6, 182, 212, 0.3);
        }

        /* ===== NOTIFICATIONS ===== */
        .notification-item {
            background: linear-gradient(135deg, rgba(109, 40, 217, 0.15) 0%, rgba(6, 182, 212, 0.1) 100%);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            gap: 1.5rem;
            backdrop-filter: blur(10px);
            max-width: 650px;
            margin-left: auto;
            margin-right: auto;
        }

        .notification-icon {
            font-size: 2rem;
            min-width: 50px;
            text-align: center;
        }

        .notification-content {
            flex: 1;
        }

        .notification-title {
            font-weight: 700;
            margin-bottom: 0.3rem;
            font-family: 'Poppins', sans-serif;
        }

        .notification-time {
            color: var(--text-light);
            font-size: 0.85rem;
        }

        /* ===== SETTINGS PAGE ===== */
        .settings-container {
            max-width: 500px;
            margin: 0 auto;
        }

        .settings-box {
            background: linear-gradient(135deg, rgba(109, 40, 217, 0.15) 0%, rgba(6, 182, 212, 0.1) 100%);
            border-radius: 20px;
            padding: 2rem;
            backdrop-filter: blur(10px);
        }

        .settings-box h2 {
            margin-bottom: 2rem;
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            background: linear-gradient(135deg, #06b6d4 0%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .setting-group {
            margin-bottom: 1.5rem;
        }

        .setting-group label {
            display: block;
            margin-bottom: 0.6rem;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
        }

        .setting-group input {
            width: 100%;
            padding: 0.8rem;
            background: rgba(26, 40, 71, 0.6);
            border: none;
            border-radius: 10px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin-bottom: 0.5rem;
        }

        .setting-group input:focus {
            outline: none;
            background: rgba(6, 182, 212, 0.1);
        }

        /* ===== BUTTONS ===== */
        .btn {
            padding: 0.7rem 1.4rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #06b6d4 0%, #6d28d9 100%);
            color: white;
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(6, 182, 212, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #f43f5e 0%, #ec4899 100%);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: rgba(26, 40, 71, 0.5);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: rgba(6, 182, 212, 0.1);
            border-color: #06b6d4;
        }

        /* ===== MODALS ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a2847 0%, #16213e 100%);
            padding: 2rem;
            border-radius: 20px;
            width: 90%;
            max-width: 550px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-content h2 {
            margin-bottom: 1.5rem;
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            background: linear-gradient(135deg, #06b6d4 0%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-content input,
        .modal-content textarea,
        .modal-content select {
            width: 100%;
            padding: 0.9rem;
            margin-bottom: 1rem;
            background: rgba(26, 40, 71, 0.8);
            border: none;
            border-radius: 10px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
        }

        .modal-content input:focus,
        .modal-content textarea:focus,
        .modal-content select:focus {
            outline: none;
            background: rgba(6, 182, 212, 0.1);
        }

        .close-modal {
            float: right;
            font-size: 1.8rem;
            cursor: pointer;
            color: var(--text-light);
            background: none;
            border: none;
            transition: all 0.3s;
        }

        .close-modal:hover {
            color: #06b6d4;
            transform: rotate(90deg);
        }

        /* ===== COMMENT MODAL ===== */
        .comments-section {
            max-height: 400px;
            overflow-y: auto;
            margin: 1rem 0;
            padding: 1rem 0;
            border-top: 1px solid rgba(109, 40, 217, 0.2);
            border-bottom: 1px solid rgba(109, 40, 217, 0.2);
        }

        .comment-item {
            padding: 1rem;
            background: rgba(26, 40, 71, 0.3);
            border-radius: 10px;
            margin-bottom: 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .comment-author {
            font-weight: 700;
            margin-bottom: 0.3rem;
        }

        .comment-text {
            color: var(--text-light);
            line-height: 1.5;
        }

        /* ===== CONFIRMATION MODAL ===== */
        .confirm-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 3000;
            align-items: center;
            justify-content: center;
        }

        .confirm-modal.active {
            display: flex;
        }

        .confirm-box {
            background: linear-gradient(135deg, #1a2847 0%, #16213e 100%);
            padding: 2.5rem;
            border-radius: 20px;
            width: 90%;
            max-width: 420px;
            text-align: center;
        }

        .confirm-box h3 {
            font-size: 1.6rem;
            margin-bottom: 1rem;
            font-family: 'Playfair Display', serif;
        }

        .confirm-box p {
            color: var(--text-light);
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .confirm-actions {
            display: flex;
            gap: 1rem;
        }

        .confirm-actions button {
            flex: 1;
            padding: 0.8rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s;
        }

        .confirm-yes {
            background: linear-gradient(135deg, #f43f5e 0%, #ec4899 100%);
            color: white;
        }

        .confirm-yes:hover {
            transform: translateY(-2px);
        }

        .confirm-no {
            background: rgba(26, 40, 71, 0.5);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .confirm-no:hover {
            background: rgba(6, 182, 212, 0.1);
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-light);
            font-family: 'Poppins', sans-serif;
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(26, 40, 71, 0.3);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #06b6d4 0%, #6d28d9 100%);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #6d28d9 0%, #06b6d4 100%);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .navbar {
                padding: 0.8rem 1rem;
            }

            .navbar-brand {
                font-size: 1.5rem;
            }

            .navbar-tabs {
                gap: 0.3rem;
                flex-wrap: wrap;
            }

            .nav-btn {
                padding: 0.5rem 0.8rem;
                font-size: 0.8rem;
            }

            .main-content {
                padding: 1rem;
            }

            .messages-container {
                grid-template-columns: 1fr;
            }

            .conversations-list {
                display: none;
            }

            .marketplace {
                grid-template-columns: 1fr;
            }

            .profile-top {
                flex-direction: column;
            }

            .auth-box {
                padding: 2rem;
            }
        }
    </style>
</head>
<body>

    <!-- ===== AUTH CONTAINER ===== -->
    <div id="authContainer">
        <!-- LOGIN PAGE -->
        <div id="loginPage">
            <div class="auth-box">
                <h2>☁️ Cloud69</h2>
                <form onsubmit="handleLogin(event)">
                    <input type="email" id="loginEmail" placeholder="Email Address" required>
                    <input type="password" id="loginPassword" placeholder="Password" required>
                    <button type="submit">Login</button>
                </form>
                <div class="auth-toggle">
                    Don't have an account? <button type="button" onclick="switchToSignup()">Sign up</button>
                </div>
            </div>
        </div>

        <!-- SIGNUP PAGE -->
        <div id="signupPage">
            <div class="auth-box">
                <h2>☁️ Cloud69</h2>
                <form onsubmit="handleSignup(event)">
                    <input type="text" id="signupFirstName" placeholder="First Name" required>
                    <input type="text" id="signupLastName" placeholder="Last Name" required>
                    <input type="text" id="signupUsername" placeholder="Username" required>
                    <input type="email" id="signupEmail" placeholder="Email Address" required>
                    <input type="password" id="signupPassword" placeholder="Password" required>
                    <button type="submit">Create Account</button>
                </form>
                <div class="auth-toggle">
                    Already have an account? <button type="button" onclick="switchToLogin()">Login</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== APP CONTAINER ===== -->
    <div id="appContainer">
        <!-- NAVBAR -->
        <div class="navbar">
            <div class="navbar-brand">☁️ Cloud69</div>
            <div class="navbar-tabs">
                <button class="nav-btn active" onclick="showPage('feed')"><i class="fas fa-home"></i> Feed</button>
                <button class="nav-btn" onclick="showPage('marketplace')"><i class="fas fa-store"></i> Marketplace</button>
                <button class="nav-btn" onclick="showPage('messages')"><i class="fas fa-envelope"></i> Messages</button>
                <button class="nav-btn notification-badge" onclick="showPage('notifications')">
                    <i class="fas fa-bell"></i> Notifications
                    <span class="badge" id="notifBadge" style="display: none;">0</span>
                </button>
                <button class="nav-btn" onclick="showPage('profile')"><i class="fas fa-user"></i> Profile</button>
                <button class="nav-btn" onclick="showPage('settings')"><i class="fas fa-cog"></i> Settings</button>
                <button class="nav-btn" onclick="showLogoutConfirm()"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <!-- FEED PAGE -->
            <div id="feed" class="page active">
                <div class="feed">
                    <div class="create-post">
                        <textarea id="postContent" placeholder="What's on your mind? ✨"></textarea>
                        <div class="create-post-actions">
                            <button class="image-upload-btn" onclick="document.getElementById('postImageInput').click()">
                                <i class="fas fa-image"></i> Add Image
                            </button>
                            <input type="file" id="postImageInput" accept="image/*">
                            <button class="post-btn" onclick="submitPost()">Post</button>
                        </div>
                    </div>
                    <div id="feedContainer"></div>
                </div>
            </div>

            <!-- MARKETPLACE PAGE -->
            <div id="marketplace" class="page">
                <div style="margin-bottom: 2rem; max-width: 1200px; margin-left: auto; margin-right: auto;">
                    <button class="btn btn-primary" style="max-width: 200px;" onclick="openListingModal()">
                        <i class="fas fa-plus"></i> Create Listing
                    </button>
                </div>
                <div class="marketplace" id="marketplaceContainer"></div>
            </div>

            <!-- MESSAGES PAGE -->
            <div id="messages" class="page">
                <div class="messages-container">
                    <div class="conversations-list">
                        <button class="add-friend-btn" onclick="openAddFriendModal()">
                            <i class="fas fa-plus"></i> Add Friend
                        </button>
                        <div id="conversationsList"></div>
                    </div>
                    <div class="chat-area">
                        <div class="chat-header" id="chatHeader">Select a conversation</div>
                        <div class="messages-area" id="messagesArea"></div>
                        <div class="message-input">
                            <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMessage()">
                            <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- NOTIFICATIONS PAGE -->
            <div id="notifications" class="page">
                <div id="notificationsContainer"></div>
            </div>

            <!-- PROFILE PAGE -->
            <div id="profile" class="page">
                <div class="profile-container">
                    <div class="profile-header">
                        <div class="profile-top">
                            <div class="profile-pic-container">
                                <div class="profile-avatar" id="profileAvatar">A</div>
                                <input type="file" id="profilePicInput" class="profile-pic-input" accept="image/*" onchange="handleProfilePictureChange(event)">
                                <div class="profile-pic-add" onclick="document.getElementById('profilePicInput').click()">
                                    <i class="fas fa-plus"></i>
                                </div>
                            </div>
                            <div class="profile-info">
                                <div class="profile-name" id="profileName">Alex Smith</div>
                                <div class="profile-username" id="profileUsername">@alexsmith</div>
                                <div class="profile-bio" id="profileBio" onclick="editBio()">Add a bio...</div>
                                <div class="profile-stats">
                                    <div class="stat-box">
                                        <div class="stat-number" id="postCount">0</div>
                                        <div class="stat-label">Posts</div>
                                    </div>
                                    <div class="stat-box">
                                        <div class="stat-number" id="followerCount">0</div>
                                        <div class="stat-label">Followers</div>
                                    </div>
                                    <div class="stat-box">
                                        <div class="stat-number" id="followingCount">0</div>
                                        <div class="stat-label">Following</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div id="myPostsContainer"></div>
                </div>
            </div>

            <!-- SETTINGS PAGE -->
            <div id="settings" class="page">
                <div class="settings-container">
                    <div class="settings-box">
                        <h2>Settings</h2>

                        <div class="setting-group">
                            <label>First Name</label>
                            <input type="text" id="settingsFirstName">
                            <button class="btn btn-primary" onclick="updateFirstName()">Update</button>
                        </div>

                        <div class="setting-group">
                            <label>Username</label>
                            <input type="text" id="settingsUsername">
                            <button class="btn btn-primary" onclick="updateUsername()">Update</button>
                        </div>

                        <div class="setting-group">
                            <label>Last Name</label>
                            <input type="text" id="settingsLastName">
                            <button class="btn btn-primary" onclick="updateLastName()">Update</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== MODALS ===== -->
    <div id="confirmModal" class="confirm-modal">
        <div class="confirm-box">
            <h3 id="confirmTitle">Confirm Action</h3>
            <p id="confirmMessage">Are you sure?</p>
            <div class="confirm-actions">
                <button class="confirm-yes" id="confirmYesBtn">Yes</button>
                <button class="confirm-no" onclick="closeConfirm()">Cancel</button>
            </div>
        </div>
    </div>

    <div id="commentModal" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeCommentModal()">✕</button>
            <h2 id="commentModalTitle">Post</h2>
            <div id="commentModalContent"></div>
            <div class="comments-section">
                <div id="commentsContainer"></div>
            </div>
            <div style="display: flex; gap: 0.8rem;">
                <input type="text" id="commentInput" placeholder="Add a comment..." style="flex: 1; padding: 0.8rem; background: rgba(26, 40, 71, 0.8); border: none; border-radius: 10px; color: var(--text);">
                <button onclick="addComment()" class="btn btn-primary" style="width: auto; padding: 0.8rem 1.5rem;">Reply</button>
            </div>
        </div>
    </div>

    <div id="listingModal" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeListingModal()">✕</button>
            <h2>Create Listing</h2>
            <input type="text" id="listingTitle" placeholder="Item Title" required>
            <input type="number" id="listingPrice" placeholder="Price" step="0.01" required>
            <select id="listingCurrency">
                <option value="USD">USD ($) - US Dollar</option>
                <option value="ZAR">ZAR (R) - South African Rand</option>
                <option value="EUR">EUR (€) - Euro</option>
                <option value="GBP">GBP (£) - British Pound</option>
                <option value="JPY">JPY (¥) - Japanese Yen</option>
                <option value="CAD">CAD (C$) - Canadian Dollar</option>
                <option value="AUD">AUD (A$) - Australian Dollar</option>
                <option value="CHF">CHF (Fr) - Swiss Franc</option>
                <option value="CNY">CNY (¥) - Chinese Yuan</option>
                <option value="INR">INR (₹) - Indian Rupee</option>
                <option value="MXN">MXN ($) - Mexican Peso</option>
                <option value="SGD">SGD (S$) - Singapore Dollar</option>
                <option value="HKD">HKD (HK$) - Hong Kong Dollar</option>
                <option value="NZD">NZD (NZ$) - New Zealand Dollar</option>
                <option value="KRW">KRW (₩) - South Korean Won</option>
                <option value="SEK">SEK (kr) - Swedish Krona</option>
                <option value="NOK">NOK (kr) - Norwegian Krone</option>
                <option value="DKK">DKK (kr) - Danish Krone</option>
                <option value="BRL">BRL (R$) - Brazilian Real</option>
                <option value="RUB">RUB (₽) - Russian Ruble</option>
            </select>
            <textarea id="listingDescription" placeholder="Description"></textarea>
            <input type="file" id="listingImage" accept="image/*" required>
            <button class="btn btn-primary" onclick="submitListing()">Create Listing</button>
