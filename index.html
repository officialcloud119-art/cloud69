<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Feed Application</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        header { display: flex; justify-content: space-between; padding: 10px; background-color: #4CAF50; color: white; }
        input[type="text"] { padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px; background-color: #008CBA; color: white; border: none; cursor: pointer; }
        .container { padding: 20px; }
        .profile { border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
        .friends-list, .follower-list, .following-list { list-style-type: none; padding: 0; }
        @media (max-width: 600px) { header { flex-direction: column; } }
    </style>
</head>
<body>
    <header>
        <h1>Social Feed</h1>
        <input type="text" id="search" placeholder="Search users..." />
        <button onclick="searchUsers()">Search</button>
    </header>
    <div class="container">
        <div id="userProfiles"></div>
    </div>
    <script>
        const users = [];
        const userProfilesElement = document.getElementById('userProfiles');

        function renderUsers() {
            userProfilesElement.innerHTML = '';
            users.forEach(user => {
                const profileDiv = document.createElement('div');
                profileDiv.className = 'profile';
                profileDiv.innerHTML = `<h2>${user.name}</h2>\n                    <p>Followers: ${user.followers.length} - Following: ${user.following.length}</p>\n                    <button onclick='followUnfollowUser(${user.id})'>${user.following.includes(currentUserId) ? 'Unfollow' : 'Follow'}</button>`;
                userProfilesElement.appendChild(profileDiv);
            });
        }

        function searchUsers() {
            const searchTerm = document.getElementById('search').value.toLowerCase();
            const filteredUsers = users.filter(user => user.name.toLowerCase().includes(searchTerm));
            userProfilesElement.innerHTML = '';
            filteredUsers.forEach(user => {
                const profileDiv = document.createElement('div');
                profileDiv.className = 'profile';
                profileDiv.innerHTML = `<h2>${user.name}</h2>\n                    <p>Followers: ${user.followers.length} - Following: ${user.following.length}</p>\n                    <button onclick='followUnfollowUser(${user.id})'>${user.following.includes(currentUserId) ? 'Unfollow' : 'Follow'}</button>`;
                userProfilesElement.appendChild(profileDiv);
            });
        }

        function followUnfollowUser(userId) {
            const user = users.find(u => u.id === userId);
            if (user.following.includes(currentUserId)) {
                user.following = user.following.filter(id => id !== currentUserId);
            } else {
                user.following.push(currentUserId);
            }
            renderUsers();
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Sample data
            users.push({ id: 1, name: 'Alice', followers: [], following: [] });
            users.push({ id: 2, name: 'Bob', followers: [], following: [] });
            // You can add more users
            renderUsers();
        });
    </script>
</body>
</html>
