<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Feed Application</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Social Feed</h1>
        <input type="text" id="search" placeholder="Search...">
    </header>
    <main>
        <section id="feed">
            <h2>Feed</h2>
            <div class="post" id="post-template" style="display:none;">
                <h3 class="post-author"></h3>
                <p class="post-content"></p>
                <button class="follow-button"></button>
                <hr>
            </div>
            <!-- Feed posts will be populated here -->
        </section>
        <section id="friends-management">
            <h2>Friends</h2>
            <button id="add-friend">Add Friend</button>
            <div id="friends-list"></div>
        </section>
        <section id="followers">
            <h2>Followers</h2>
            <div id="followers-list"></div>
        </section>
        <section id="following">
            <h2>Following</h2>
            <div id="following-list"></div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Social Feed Application</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
