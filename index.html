    <div id="bioModal" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeBioModal()">✕</button>
            <h2>Edit Bio</h2>
            <textarea id="bioInput" placeholder="Tell us about yourself..." style="min-height: 120px;"></textarea>
            <button class="btn btn-primary" onclick="saveBio()">Save</button>
        </div>
    </div>

    <div id="addFriendModal" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeAddFriendModal()">✕</button>
            <h2>Add Friend</h2>
            <input type="text" id="friendSearch" placeholder="Search username or email...">
            <div id="searchResults" style="margin-top: 1.5rem; max-height: 350px; overflow-y: auto;"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script>
        // ===== STORAGE & DATA =====
        const STORAGE = {
            USERS: 'cloud69_users',
            POSTS: 'cloud69_posts',
            ITEMS: 'cloud69_items',
            CURRENT_USER: 'cloud69_current_user',
            CONVERSATIONS: 'cloud69_conversations',
            NOTIFICATIONS: 'cloud69_notifications',
            FOLLOWS: 'cloud69_follows',
            BLOCKS: 'cloud69_blocks'
        };

        let currentUser = null;
        let posts = [];
        let items = [];
        let conversations = {};
        let notifications = [];
        let follows = {};
        let blocks = {};
        let currentConversation = null;
        let pendingConfirm = null;
        let selectedPostForComments = null;

        // ===== INIT =====
        function init() {
            loadFromStorage();
            const saved = localStorage.getItem(STORAGE.CURRENT_USER);
            if (saved) {
                currentUser = JSON.parse(saved);
                showApp();
                updateUI();
            } else {
                showAuth();
            }
        }

        function loadFromStorage() {
            posts = JSON.parse(localStorage.getItem(STORAGE.POSTS)) || [];
            items = JSON.parse(localStorage.getItem(STORAGE.ITEMS)) || [];
            conversations = JSON.parse(localStorage.getItem(STORAGE.CONVERSATIONS)) || {};
            notifications = JSON.parse(localStorage.getItem(STORAGE.NOTIFICATIONS)) || [];
            follows = JSON.parse(localStorage.getItem(STORAGE.FOLLOWS)) || {};
            blocks = JSON.parse(localStorage.getItem(STORAGE.BLOCKS)) || {};
        }

        function saveToStorage() {
            localStorage.setItem(STORAGE.POSTS, JSON.stringify(posts));
            localStorage.setItem(STORAGE.ITEMS, JSON.stringify(items));
            localStorage.setItem(STORAGE.CONVERSATIONS, JSON.stringify(conversations));
            localStorage.setItem(STORAGE.NOTIFICATIONS, JSON.stringify(notifications));
            localStorage.setItem(STORAGE.FOLLOWS, JSON.stringify(follows));
            localStorage.setItem(STORAGE.BLOCKS, JSON.stringify(blocks));
        }

        // ===== CONFIRMATION MODAL =====
        function showConfirm(title, message, onConfirm) {
            document.getElementById('confirmTitle').textContent = title;
            document.getElementById('confirmMessage').textContent = message;
            pendingConfirm = onConfirm;
            document.getElementById('confirmYesBtn').onclick = () => {
                closeConfirm();
                onConfirm();
            };
            document.getElementById('confirmModal').classList.add('active');
        }

        function closeConfirm() {
            document.getElementById('confirmModal').classList.remove('active');
            pendingConfirm = null;
        }

        // ===== AUTH =====
        function switchToSignup() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('signupPage').style.display = 'flex';
            document.getElementById('signupPage').style.justifyContent = 'center';
            document.getElementById('signupPage').style.alignItems = 'center';
        }

        function switchToLogin() {
            document.getElementById('signupPage').style.display = 'none';
            document.getElementById('loginPage').style.display = 'flex';
        }

        function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            if (!email || !password) {
                showConfirm('Error', 'Please fill in all fields', () => {});
                return;
            }

            const users = JSON.parse(localStorage.getItem(STORAGE.USERS)) || {};
            const user = users[email];

            if (user && user.password === password) {
                currentUser = user;
                localStorage.setItem(STORAGE.CURRENT_USER, JSON.stringify(currentUser));
                loadFromStorage();
                document.getElementById('loginEmail').value = '';
                document.getElementById('loginPassword').value = '';
                showApp();
                updateUI();
            } else {
                showConfirm('Login Failed', 'Invalid email or password', () => {});
            }
        }

        function handleSignup(event) {
            event.preventDefault();
            const firstName = document.getElementById('signupFirstName').value.trim();
            const lastName = document.getElementById('signupLastName').value.trim();
            const username = document.getElementById('signupUsername').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value.trim();

            if (!firstName || !lastName || !username || !email || !password) {
                showConfirm('Error', 'Please fill in all fields', () => {});
                return;
            }

            const users = JSON.parse(localStorage.getItem(STORAGE.USERS)) || {};

            if (users[email]) {
                showConfirm('Error', 'Email already exists', () => {});
                return;
            }

            const newUser = {
                id: Date.now().toString(),
                firstName,
                lastName,
                username,
                email,
                password,
                bio: '',
                profileImage: null
            };

            users[email] = newUser;
            localStorage.setItem(STORAGE.USERS, JSON.stringify(users));

            currentUser = newUser;
            localStorage.setItem(STORAGE.CURRENT_USER, JSON.stringify(currentUser));
            follows[currentUser.id] = [];
            blocks[currentUser.id] = [];
            saveToStorage();

            document.getElementById('signupFirstName').value = '';
            document.getElementById('signupLastName').value = '';
            document.getElementById('signupUsername').value = '';
            document.getElementById('signupEmail').value = '';
            document.getElementById('signupPassword').value = '';

            showApp();
            updateUI();
        }

        function showLogoutConfirm() {
            showConfirm('Logout', 'Are you sure you want to logout?', logout);
        }

        function logout() {
            localStorage.removeItem(STORAGE.CURRENT_USER);
            location.reload();
        }

        function showAuth() {
            document.getElementById('authContainer').style.display = 'flex';
            document.getElementById('appContainer').classList.remove('active');
        }

        function showApp() {
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('appContainer').classList.add('active');
        }

        // ===== NAVIGATION =====
        function showPage(pageName) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageName).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            event.target.closest('.nav-btn').classList.add('active');

            if (pageName === 'feed') renderFeed();
            else if (pageName === 'marketplace') renderMarketplace();
            else if (pageName === 'messages') renderMessages();
            else if (pageName === 'notifications') renderNotifications();
            else if (pageName === 'profile') renderProfile();
            else if (pageName === 'settings') renderSettings();
        }

        // ===== POSTS =====
        function submitPost() {
            const content = document.getElementById('postContent').value.trim();
            const file = document.getElementById('postImageInput').files[0];

            if (!content && !file) {
                showConfirm('Error', 'Please add content or an image', () => {});
                return;
            }

            const post = {
                id: Date.now().toString(),
                authorId: currentUser.id,
                author: `${currentUser.firstName} ${currentUser.lastName}`,
                username: currentUser.username,
                profileImage: currentUser.profileImage,
                content,
                image: file ? URL.createObjectURL(file) : null,
                likes: 0,
                likedBy: [],
                comments: [],
                timestamp: Date.now()
            };

            posts.unshift(post);
            saveToStorage();
            document.getElementById('postContent').value = '';
            document.getElementById('postImageInput').value = '';
            renderFeed();
        }

        function renderFeed() {
            const container = document.getElementById('feedContainer');
            container.innerHTML = '';

            if (posts.length === 0) {
                container.innerHTML = '<div class="empty-state">📭 No posts yet. Be the first to share!</div>';
                return;
            }

            posts.forEach(post => {
                const isOwn = post.authorId === currentUser.id;
                const liked = post.likedBy.includes(currentUser.id);
                const likeIcon = liked ? '❤️' : '🤍';

                let html = `
                    <div class="post-card">
                        <div class="post-header">
                            <div class="post-author">
                                <div class="post-avatar" style="background-image: url('${post.profileImage || 'linear-gradient(135deg, #06b6d4 0%, #6d28d9 100%)'}'); background-size: cover; background-position: center;">
                                    ${!post.profileImage ? post.author.charAt(0).toUpperCase() : ''}
                                </div>
                                <div class="post-info">
                                    <h4>${post.author}</h4>
                                    <small>@${post.username}</small>
                                </div>
                            </div>
                            ${isOwn ? `<button class="delete-btn" onclick="showDeletePostConfirm('${post.id}')">🗑️</button>` : ''}
                        </div>
                        ${post.content ? `<div class="post-content">${post.content}</div>` : ''}
                        ${post.image ? `<img src="${post.image}" class="post-image">` : ''}
                        <div class="post-stats">
                            <div class="stat" onclick="toggleLike('${post.id}')" style="cursor: pointer;">${likeIcon} ${post.likes}</div>
                            <div class="stat" onclick="openCommentModal('${post.id}')" style="cursor: pointer;">💬 ${post.comments.length}</div>
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        function toggleLike(postId) {
            const post = posts.find(p => p.id === postId);
            const index = post.likedBy.indexOf(currentUser.id);

            if (index > -1) {
                post.likedBy.splice(index, 1);
                post.likes--;
            } else {
                post.likedBy.push(currentUser.id);
                post.likes++;
                if (post.authorId !== currentUser.id) {
                    addNotification('like', currentUser.firstName, `${currentUser.firstName} liked your post`);
                }
            }

            saveToStorage();
            renderFeed();
        }

        function openCommentModal(postId) {
            selectedPostForComments = postId;
            const post = posts.find(p => p.id === postId);
            document.getElementById('commentModalTitle').textContent = `${post.author}'s Post`;
            document.getElementById('commentModalContent').innerHTML = `
                <div style="margin-bottom: 1rem; padding-bottom: 1rem;">
                    <div style="margin-bottom: 0.5rem;">
                        <strong>${post.author}</strong> <small style="color: var(--text-light);">@${post.username}</small>
                    </div>
                    ${post.content ? `<div style="margin: 0.8rem 0;">${post.content}</div>` : ''}
                    ${post.image ? `<img src="${post.image}" style="width: 100%; border-radius: 12px; margin: 0.8rem 0; max-height: 250px; object-fit: cover;">` : ''}
                </div>
            `;

            const commentsContainer = document.getElementById('commentsContainer');
            commentsContainer.innerHTML = '';

            if (post.comments.length === 0) {
                commentsContainer.innerHTML = '<div style="color: var(--text-light); text-align: center; padding: 1rem;">No comments yet. Be the first!</div>';
            } else {
                post.comments.forEach((comment, index) => {
                    const isOwnComment = comment.authorId === currentUser.id;
                    commentsContainer.innerHTML += `
                        <div class="comment-item">
                            <div style="display: flex; justify-content: space-between; align-items: start;">
                                <div style="flex: 1;">
                                    <div class="comment-author">${comment.author}</div>
                                    <small style="color: var(--text-light); font-size: 0.8rem;">@${comment.username}</small>
                                </div>
                                ${isOwnComment ? `<button onclick="deleteComment('${selectedPostForComments}', ${index})" style="background: none; border: none; color: #f43f5e; cursor: pointer; font-size: 0.9rem;">🗑️</button>` : ''}
                            </div>
                            <div class="comment-text" style="margin-top: 0.5rem;">${comment.text}</div>
                        </div>
                    `;
                });
            }

            document.getElementById('commentModal').classList.add('active');
        }

        function closeCommentModal() {
            document.getElementById('commentModal').classList.remove('active');
            selectedPostForComments = null;
        }

        function addComment() {
            const text = document.getElementById('commentInput').value.trim();
            if (!text) return;

            const post = posts.find(p => p.id === selectedPostForComments);
            post.comments.push({
                authorId: currentUser.id,
                author: `${currentUser.firstName} ${currentUser.lastName}`,
                username: currentUser.username,
                text,
                timestamp: Date.now()
            });

            if (post.authorId !== currentUser.id) {
                addNotification('comment', currentUser.firstName, `${currentUser.firstName} commented on your post`);
            }

            saveToStorage();
            document.getElementById('commentInput').value = '';
            openCommentModal(selectedPostForComments);
            renderFeed();
        }

        function deleteComment(postId, commentIndex) {
            showConfirm('Delete Comment', 'Delete this comment?', () => {
                const post = posts.find(p => p.id === postId);
                post.comments.splice(commentIndex, 1);
                saveToStorage();
                openCommentModal(postId);
                renderFeed();
            });
        }

        function showDeletePostConfirm(postId) {
            showConfirm('Delete Post', 'Delete this post?', () => deletePost(postId));
        }

        function deletePost(postId) {
            posts = posts.filter(p => p.id !== postId);
            saveToStorage();
            renderFeed();
            renderProfile();
        }

        // ===== MARKETPLACE =====
        function openListingModal() {
            document.getElementById('listingModal').classList.add('active');
        }

        function closeListingModal() {
            document.getElementById('listingModal').classList.remove('active');
        }

        function submitListing() {
            const title = document.getElementById('listingTitle').value.trim();
            const price = document.getElementById('listingPrice').value.trim();
            const currency = document.getElementById('listingCurrency').value;
            const description = document.getElementById('listingDescription').value.trim();
            const file = document.getElementById('listingImage').files[0];

            if (!title || !price || !file) {
                showConfirm('Error', 'Please fill in all fields', () => {});
                return;
            }

            const item = {
                id: Date.now().toString(),
                sellerId: currentUser.id,
                seller: currentUser.username,
                title,
                price,
                currency,
                description,
                image: URL.createObjectURL(file),
                likes: 0,
                likedBy: [],
                timestamp: Date.now()
            };

            items.unshift(item);
            saveToStorage();
            closeListingModal();
            document.getElementById('listingTitle').value = '';
            document.getElementById('listingPrice').value = '';
            document.getElementById('listingDescription').value = '';
            document.getElementById('listingImage').value = '';
            document.getElementById('listingCurrency').value = 'USD';
            renderMarketplace();
        }

        function renderMarketplace() {
            const container = document.getElementById('marketplaceContainer');
            container.innerHTML = '';

            if (items.length === 0) {
                container.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;">🏪 No listings yet</div>';
                return;
            }

            items.forEach(item => {
                const isOwn = item.sellerId === currentUser.id;
                const liked = item.likedBy.includes(currentUser.id);
                const likeIcon = liked ? '❤️' : '🤍';

                let html = `
                    <div class="item-card">
                        <img src="${item.image}" class="item-image">
                        <div class="item-details">
                            <div class="item-title">${item.title}</div>
                            <div class="item-price">${item.currency} ${parseFloat(item.price).toFixed(2)}</div>
                            <div class="item-seller">by @${item.seller}</div>
                            <div class="item-actions">
                                <div onclick="toggleItemLike('${item.id}')" style="cursor: pointer; text-align: center;">${likeIcon} ${item.likes}</div>
                                ${isOwn ? `<button class="btn btn-danger" style="padding: 0.5rem 1rem; font-size: 0.85rem;" onclick="showDeleteListingConfirm('${item.id}')">🗑️</button>` : ''}
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        function toggleItemLike(itemId) {
            const item = items.find(i => i.id === itemId);
            const index = item.likedBy.indexOf(currentUser.id);

            if (index > -1) {
                item.likedBy.splice(index, 1);
                item.likes--;
            } else {
                item.likedBy.push(currentUser.id);
                item.likes++;
            }

            saveToStorage();
            renderMarketplace();
        }

        function showDeleteListingConfirm(itemId) {
            showConfirm('Delete Listing', 'Delete this listing?', () => deleteListing(itemId));
        }

        function deleteListing(itemId) {
            items = items.filter(i => i.id !== itemId);
            saveToStorage();
            renderMarketplace();
        }

        // ===== PROFILE =====
        function renderProfile() {
            const user = currentUser;

            document.getElementById('profileAvatar').textContent = user.firstName.charAt(0).toUpperCase();
            if (user.profileImage) {
                document.getElementById('profileAvatar').style.backgroundImage = `url('${user.profileImage}')`;
                document.getElementById('profileAvatar').textContent = '';
            } else {
                document.getElementById('profileAvatar').style.backgroundImage = 'linear-gradient(135deg, #06b6d4 0%, #6d28d9 100%)';
                document.getElementById('profileAvatar').textContent = user.firstName.charAt(0).toUpperCase();
            }

            document.getElementById('profileName').textContent = `${user.firstName} ${user.lastName}`;
            document.getElementById('profileUsername').textContent = `@${user.username}`;
            document.getElementById('profileBio').textContent = user.bio || 'Add a bio...';

            const userFollows = follows[user.id] || [];
            const userFollowers = Object.values(follows).filter(f => f.includes(user.id)).length;

            document.getElementById('followerCount').textContent = userFollowers;
            document.getElementById('followingCount').textContent = userFollows.length;

            const userPosts = posts.filter(p => p.authorId === user.id);
            document.getElementById('postCount').textContent = userPosts.length;

            document.getElementById('settingsFirstName').value = user.firstName;
            document.getElementById('settingsLastName').value = user.lastName;
            document.getElementById('settingsUsername').value = user.username;

            const container = document.getElementById('myPostsContainer');
            container.innerHTML = '';

            if (userPosts.length === 0) {
                container.innerHTML = '<div class="empty-state">📝 No posts yet</div>';
                return;
            }

            userPosts.slice().reverse().forEach(post => {
                const liked = post.likedBy.includes(currentUser.id);
                const likeIcon = liked ? '❤️' : '🤍';

                container.innerHTML += `
                    <div class="post-card">
                        <div class="post-header">
                            <div class="post-author">
                                <div class="post-avatar" style="background-image: url('${post.profileImage || 'linear-gradient(135deg, #06b6d4 0%, #6d28d9 100%)'}'); background-size: cover;">
                                    ${!post.profileImage ? post.author.charAt(0).toUpperCase() : ''}
                                </div>
                                <div class="post-info">
                                    <h4>${post.author}</h4>
                                    <small>@${post.username}</small>
                                </div>
                            </div>
                            <button class="delete-btn" onclick="showDeletePostConfirm('${post.id}')">🗑️</button>
                        </div>
                        ${post.content ? `<div class="post-content">${post.content}</div>` : ''}
                        ${post.image ? `<img src="${post.image}" class="post-image">` : ''}
                        <div class="post-stats">
                            <div class="stat" onclick="toggleLike('${post.id}')" style="cursor: pointer;">${likeIcon} ${post.likes}</div>
                            <div class="stat" onclick="openCommentModal('${post.id}')" style="cursor: pointer;">💬 ${post.comments.length}</div>
                        </div>
                    </div>
                `;
            });
        }

        function handleProfilePictureChange(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    currentUser.profileImage = e.target.result;
                    saveCurrentUser();
                    renderProfile();
                    renderFeed();
                    showConfirm('Success', 'Profile picture updated!', () => {});
                };
                reader.readAsDataURL(file);
            }
        }

        function editBio() {
            document.getElementById('bioInput').value = currentUser.bio || '';
            document.getElementById('bioModal').classList.add('active');
        }

        function closeBioModal() {
            document.getElementById('bioModal').classList.remove('active');
        }

        function saveBio() {
            const bio = document.getElementById('bioInput').value.trim();
            currentUser.bio = bio;
            saveCurrentUser();
            closeBioModal();
            renderProfile();
        }

        // ===== SETTINGS =====
        function renderSettings() {
            document.getElementById('settingsFirstName').value = currentUser.firstName;
            document.getElementById('settingsLastName').value = currentUser.lastName;
            document.getElementById('settingsUsername').value = currentUser.username;
        }

        function updateFirstName() {
            const firstName = document.getElementById('settingsFirstName').value.trim();
            if (firstName) {
                currentUser.firstName = firstName;
                saveCurrentUser();
                renderProfile();
                showConfirm('Success', 'First name updated!', () => {});
            } else {
                showConfirm('Error', 'Please enter a first name', () => {});
            }
        }

        function updateLastName() {
            const lastName = document.getElementById('settingsLastName').value.trim();
            if (lastName) {
                currentUser.lastName = lastName;
                saveCurrentUser();
                renderProfile();
                showConfirm('Success', 'Last name updated!', () => {});
            } else {
                showConfirm('Error', 'Please enter a last name', () => {});
            }
        }

        function updateUsername() {
            const username = document.getElementById('settingsUsername').value.trim();
            if (username) {
                currentUser.username = username;
                saveCurrentUser();
                renderProfile();
                showConfirm('Success', 'Username updated!', () => {});
            } else {
                showConfirm('Error', 'Please enter a username', () => {});
            }
        }

        function saveCurrentUser() {
            const users = JSON.parse(localStorage.getItem(STORAGE.USERS)) || {};
            users[currentUser.email] = currentUser;
            localStorage.setItem(STORAGE.USERS, JSON.stringify(users));
            localStorage.setItem(STORAGE.CURRENT_USER, JSON.stringify(currentUser));
        }

        // ===== MESSAGES =====
        function openAddFriendModal() {
            document.getElementById('addFriendModal').classList.add('active');
            document.getElementById('friendSearch').value = '';
            document.getElementById('searchResults').innerHTML = '';
        }

        function closeAddFriendModal() {
            document.getElementById('addFriendModal').classList.remove('active');
        }

        document.addEventListener('DOMContentLoaded', function() {
            const friendSearch = document.getElementById('friendSearch');
            if (friendSearch) {
                friendSearch.addEventListener('input', function() {
                    const search = this.value.toLowerCase();
                    const users = JSON.parse(localStorage.getItem(STORAGE.USERS)) || {};
                    const results = document.getElementById('searchResults');
                    results.innerHTML = '';

                    Object.values(users).filter(u => 
                        u.id !== currentUser.id && (
                            u.username.toLowerCase().includes(search) ||
                            u.email.toLowerCase().includes(search)
                        )
                    ).forEach(user => {
                        const isFollowing = (follows[currentUser.id] || []).includes(user.id);
                        results.innerHTML += `
                            <div style="padding: 1rem; background: rgba(26, 40, 71, 0.5); border-radius: 10px; margin-bottom: 0.8rem; display: flex; justify-content: space-between; align-items: center;">
                                <div>
                                    <div style="font-weight: 700; font-family: 'Poppins', sans-serif;">${user.firstName} ${user.lastName}</div>
                                    <small style="color: var(--text-light);">@${user.username}</small>
                                </div>
                                <button class="btn ${isFollowing ? 'btn-secondary' : 'btn-primary'}" style="max-width: 120px; padding: 0.6rem 1rem;" onclick="toggleFollow('${user.id}')">
                                    ${isFollowing ? 'Following' : 'Follow'}
                                </button>
                            </div>
                        `;
                    });
                });
            }
        });

        function toggleFollow(userId) {
            if (!follows[currentUser.id]) follows[currentUser.id] = [];
            const index = follows[currentUser.id].indexOf(userId);

            if (index > -1) {
                follows[currentUser.id].splice(index, 1);
            } else {
                follows[currentUser.id].push(userId);
                const users = JSON.parse(localStorage.getItem(STORAGE.USERS)) || {};
                const followedUser = Object.values(users).find(u => u.id === userId);
                if (followedUser) {
                    addNotification('follow', currentUser.firstName, `${currentUser.firstName} started following you`);
                }
            }

            saveToStorage();
            renderMessages();
            const search = document.getElementById('friendSearch');
            if (search) search.dispatchEvent(new Event('input'));
        }

        function renderMessages() {
            const list = document.getElementById('conversationsList');
            const userFollows = follows[currentUser.id] || [];
            list.innerHTML = '';

            userFollows.forEach(userId => {
                const users = JSON.parse(localStorage.getItem(STORAGE.USERS)) || {};
                const user = Object.values(users).find(u => u.id === userId);
                if (!user) return;

                list.innerHTML += `
                    <div class="conversation-item ${currentConversation === userId ? 'active' : ''}" onclick="openConversation('${userId}')">
                        <div class="conversation-name">${user.firstName} ${user.lastName}</div>
                        <div class="conversation-actions">
                            <button onclick="blockUser('${userId}')" title="Block" style="background: none; border: none; color: var(--text-light); cursor: pointer; font-size: 0.9rem;">🚫</button>
                            <button onclick="deleteConversation('${userId}')" title="Delete" style="background: none; border: none; color: var(--text-light); cursor: pointer; font-size: 0.9rem;">🗑️</button>
                        </div>
                    </div>
                `;
            });

            if (userFollows.length === 0) {
                list.innerHTML = '<div style="padding: 1rem; color: var(--text-light); text-align: center; font-family: \'Poppins\', sans-serif;">👥 No friends yet</div>';
            }
        }

        function openConversation(userId) {
            currentConversation = userId;
            renderMessages();
            renderMessageArea();
        }

        function renderMessageArea() {
            const users = JSON.parse(localStorage.getItem(STORAGE.USERS)) || {};
            const user = Object.values(users).find(u => u.id === currentConversation);

            if (!user) return;

            document.getElementById('chatHeader').textContent = `${user.firstName} ${user.lastName}`;
            const conv = conversations[`${currentUser.id}-${user.id}`] || [];

            const area = document.getElementById('messagesArea');
            area.innerHTML = '';

            conv.forEach(msg => {
                area.innerHTML += `
                    <div class="message ${msg.senderId === currentUser.id ? 'own' : ''}">
                        <div class="message-bubble">${msg.text}</div>
                    </div>
                `;
            });

            area.scrollTop = area.scrollHeight;
        }

        function sendMessage() {
            if (!currentConversation) return;

            const input = document.getElementById('messageInput');
            const text = input.value.trim();

            if (!text) return;

            const key = `${currentUser.id}-${currentConversation}`;
            if (!conversations[key]) conversations[key] = [];

            conversations[key].push({
                senderId: currentUser.id,
                text,
                timestamp: Date.now()
            });

            input.value = '';
            saveToStorage();
            renderMessageArea();
        }

        function blockUser(userId) {
            showConfirm('Block User', 'Block this user?', () => {
                if (!blocks[currentUser.id]) blocks[currentUser.id] = [];
                blocks[currentUser.id].push(userId);
                deleteConversation(userId);
            });
        }

        function deleteConversation(userId) {
            const key = `${currentUser.id}-${userId}`;
            delete conversations[key];
            saveToStorage();
            currentConversation = null;
            renderMessages();
            document.getElementById('chatHeader').textContent = 'Select a conversation';
            document.getElementById('messagesArea').innerHTML = '';
        }

        // ===== NOTIFICATIONS =====
        function addNotification(type, title, message) {
            notifications.push({
                id: Date.now().toString(),
                type,
                title,
                message,
                timestamp: Date.now()
            });
            saveToStorage();
            updateNotificationBadge();
        }

        function renderNotifications() {
            const container = document.getElementById('notificationsContainer');
            container.innerHTML = '';

            if (notifications.length === 0) {
                container.innerHTML = '<div class="empty-state">🔔 No notifications</div>';
                return;
            }

            const icons = {
                'like': '❤️',
                'comment': '💬',
                'follow': '👤',
                'post': '📝',
                'suggested': '⭐'
            };

            [...notifications].reverse().forEach((notif, index) => {
                container.innerHTML += `
                    <div class="notification-item">
                        <div class="notification-icon">${icons[notif.type] || '📢'}</div>
                        <div class="notification-content">
                            <div class="notification-title">${notif.title}</div>
                            <div>${notif.message}</div>
                            <div class="notification-time">${new Date(notif.timestamp).toLocaleString()}</div>
                        </div>
                        <button class="delete-btn" onclick="deleteNotification('${notif.id}')" style="background: none; border: none; color: #f43f5e; cursor: pointer; font-size: 1rem;">🗑️</button>
                    </div>
                `;
            });
        }

        function deleteNotification(notifId) {
            notifications = notifications.filter(n => n.id !== notifId);
            saveToStorage();
            renderNotifications();
            updateNotificationBadge();
        }

        function updateNotificationBadge() {
            const badge = document.getElementById('notifBadge');
            if (notifications.length > 0) {
                badge.textContent = notifications.length;
                badge.style.display = 'flex';
            } else {
                badge.style.display = 'none';
            }
        }

        function updateUI() {
            updateNotificationBadge();
        }

        // ===== INIT =====
        init();
    </script>
</body>
</html>
